<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css" integrity="sha512-SzlrxWUlpfuzQ+pcUCosxcglQRNAq/DZjVsC0lE40xsADsfeQoEypE+enwcOiGjk/bSuGGKHEyjSoQ1zVisanQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
    <title>Nawaf Al-mehdhar</title>
</head>
<body>
    <!-- start header -->
    <header>
        <a href="#" class="home">Home</a>

        <nav class="nav">
            <a href="#about">About me</a>
            <a href="#skills">Skills</a>
            <a href="#projects">Projects</a>
            <a href="#contact">Contact me</a>
        </nav>
    </header>
<!-- end header -->

<!-- start main section -->
    <section class="main">
        <div>
            <h2>Welcome to my Portfolio, I'm a <br> <span> Web Developer</span></h2>
            <h3>I love to learn</h3>
            <a href="#projects" class="main-btn">See my Projects</a>
            <div class="social-icons">
                
               
               
                <a href="#linkedIn" ><i class="fa-brands fa-linkedin"></i></a>
                <a href="#Github" ><i class="fa-brands fa-github"></i></a>
            </div>
        </div>
    </section>
<!-- end main section -->

<!-- start skills section -->
    <section class="cards" id="skills">
        <h2 class="title">Skills</h2>
        <div class="content">
            
            
            <div class="card" id="html">
                <div class="icon">
                    <i class="fa-brands fa-html5"></i>
                </div>
                <div class="info">
                    <h3>html</h3>
                    <p>info</p>
                </div>
            </div>
            <div class="card" id="css">
                <div class="icon">
                    <i class="fa-brands fa-css3-alt"></i>
                </div>
                <div class="info">
                    <h3>css</h3>
                    <p>info</p>
                </div>
            </div>
            <div class="card" id="js">
                <div class="icon">
                    <i class="fa-brands fa-js"></i>
                </div>
                <div class="info">
                    <h3>javaScript</h3>
                    <p>info</p>
                </div>
            </div>
            
        </div>
    </section>
<!-- end skills section -->

<!-- start projects section -->
    <section class="projects" id="projects">
        <h2 class="title">Projects</h2>
        <div class="content">
            <div class="project-card">
                <div class="project-image">
                    <img src="images/survey-form.png" alt="survey form" />
                </div>
                <div class="project-info">
                    <p class="project-skills">skills used</p>
                    <strong class="project-title">
                        <span>name</span>
                        <a href="#" class="details">details</a>
                    </strong>
                </div>
            </div>
        </div>
    </section>
<!-- end projects section -->

<!-- start contact section -->
    <section class="cards contact" id="contact">
        <h2 class="title">Let's work together</h2>
        <div class="content">
            <div class="card" id="email">
                <div class="icon">
                    <i class="fa-solid fa-envelope"></i>
                </div>
                <div class="info">
                    <h3>email</h3>
                    <p>n.mehdar8@gmail.com</p>
                </div>
            </div>
        </div>
    </section>
<!-- end contact section -->

<!-- start footer -->
<footer>
    <p id="footer-title">Copyrights @ <span>Nawaf Al-mehdhar</span></p>
    <div class="social-icons">
        <a href="#linkedIn" ><i class="fa-brands fa-linkedin"></i></a>
        <a href="#Github" ><i class="fa-brands fa-github"></i></a>
    </div>
</footer>
<!-- end footer -->
</body>
</html>
